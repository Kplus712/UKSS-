<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Candidate Registration — UKSS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<!-- ✅ jsPDF (Download PDF + Tables) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>

<style>
  :root{
    --accent:#2e7d32;
    --bg:#f6fff6;
    --text:#123;
    --muted:#5a6a60;
    --border:rgba(0,0,0,.10);
    --soft:rgba(46,125,50,.08);
  }
  *{box-sizing:border-box}
  body{
    margin:0;
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial;
    background:var(--bg);
    color:var(--text);
  }

  /* ===== Simple top menu ===== */
  .topbar{
    position:sticky; top:0; z-index:50;
    background:#fff;
    border-bottom:1px solid rgba(0,0,0,.07);
  }
  .topbar .inner{
    max-width:1100px;
    margin:0 auto;
    padding:12px 16px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    flex-wrap:wrap;
  }
  .brand{
    display:flex;
    flex-direction:column;
    gap:2px;
  }
  .brand b{
    color:var(--accent);
    letter-spacing:.6px;
    font-size:15px;
  }
  .brand small{
    color:var(--muted);
    font-weight:700;
    font-size:12px;
  }
  .menu{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    align-items:center;
  }
  .btn{
    border:none;
    cursor:pointer;
    font-weight:900;
    border-radius:10px;
    padding:10px 12px;
    background:var(--soft);
    color:#1b5e20;
  }
  .btn.primary{
    background:var(--accent);
    color:#fff;
  }
  .pill{
    padding:8px 10px;
    border-radius:999px;
    background:#fff;
    border:1px solid rgba(46,125,50,.22);
    color:#1b5e20;
    font-weight:900;
    font-size:12px;
  }

  /* ===== Page ===== */
  .page{
    max-width:1100px;
    margin:0 auto;
    padding:16px;
  }

  /* ===== Simple cards ===== */
  .card{
    background:#fff;
    border:1px solid var(--border);
    border-radius:12px;
    padding:14px;
  }
  .cardTitle{
    margin:0 0 10px;
    color:#1b5e20;
    font-weight:900;
    font-size:14px;
    letter-spacing:.4px;
  }
  .hint{
    margin:6px 0 0;
    color:var(--muted);
    font-weight:700;
    font-size:12px;
  }

  /* ===== Registration centered ===== */
  .centerBox{
    display:flex;
    justify-content:center;
    margin-top:10px;
  }
  .registerCard{
    width:min(720px, 100%);
  }

  label{
    display:block;
    font-weight:900;
    color:#1b5e20;
    font-size:12px;
    margin:4px 0 6px;
  }
  input, select{
    width:100%;
    padding:10px 12px;
    border-radius:10px;
    border:1px solid rgba(0,0,0,.12);
    outline:none;
    font-size:14px;
    background:#fff;
  }
  input:focus, select:focus{
    border-color: rgba(46,125,50,.55);
    box-shadow: 0 0 0 4px rgba(46,125,50,.10);
  }
  .grid{
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap:10px;
  }
  .grid.one{ grid-template-columns:1fr; }

  .rowBtns{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin-top:10px;
  }
  .rowBtns .btn{
    flex:1;
    justify-content:center;
    display:inline-flex;
    align-items:center;
  }

  .unlockBox{
    background:rgba(46,125,50,.06);
    border:1px dashed rgba(46,125,50,.30);
    border-radius:12px;
    padding:12px;
    margin-bottom:12px;
  }

  .preview{
    display:flex;
    align-items:center;
    gap:12px;
    padding:10px;
    border-radius:12px;
    border:1px solid rgba(0,0,0,.08);
    background:#fbfffb;
    margin-top:10px;
  }
  .preview img{
    width:64px; height:64px;
    border-radius:12px;
    border:1px solid rgba(46,125,50,.35);
    object-fit:cover;
    display:none;
  }
  .preview .txt{
    font-size:12px;
    color:var(--muted);
    font-weight:800;
    line-height:1.3;
  }

  /* ===== Candidates by position ===== */
  .sectionHead{
    display:flex;
    align-items:flex-end;
    justify-content:space-between;
    gap:10px;
    flex-wrap:wrap;
    margin:18px 0 10px;
  }
  .sectionHead h3{
    margin:0;
    color:#1b5e20;
    font-weight:900;
    letter-spacing:.4px;
    font-size:14px;
  }
  .sectionHead .sub{
    color:var(--muted);
    font-weight:800;
    font-size:12px;
  }

  .positions{
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap:12px;
  }
  .posBox{
    background:#fff;
    border:1px solid rgba(0,0,0,.10);
    border-radius:12px;
    overflow:hidden;
  }
  .posTop{
    padding:10px 12px;
    background:rgba(46,125,50,.08);
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    border-bottom:1px solid rgba(0,0,0,.06);
  }
  .posTop b{
    font-size:12px;
    letter-spacing:.5px;
    text-transform:uppercase;
    color:#1b5e20;
  }
  .posTop span{
    font-size:12px;
    font-weight:900;
    color:#1b5e20;
    background:#fff;
    border:1px solid rgba(46,125,50,.22);
    padding:4px 8px;
    border-radius:999px;
  }
  .posList{
    padding:10px 12px;
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  .cand{
    display:flex;
    align-items:center;
    gap:10px;
    border:1px solid rgba(0,0,0,.08);
    border-radius:12px;
    padding:10px;
    background:#fff;
  }
  .cand img{
    width:54px; height:54px;
    border-radius:12px;
    border:1px solid rgba(46,125,50,.30);
    object-fit:cover;
    background:#fff;
  }
  .cand .name{
    font-weight:900;
    font-size:13px;
    color:#17341b;
    line-height:1.2;
  }
  .cand .meta{
    font-size:12px;
    color:var(--muted);
    font-weight:800;
    margin-top:3px;
  }
  .cand .act{
    margin-left:auto;
    display:flex;
    gap:8px;
    flex-wrap:wrap;
  }
  .mini{
    border:none;
    cursor:pointer;
    border-radius:10px;
    padding:8px 10px;
    font-weight:900;
    font-size:12px;
    color:#fff;
  }
  .mini.edit{ background:#0277bd; }
  .mini.del{ background:#c62828; }

  .empty{
    padding:12px;
    text-align:center;
    color:var(--muted);
    font-weight:800;
    font-style:italic;
  }

  @media (max-width:980px){
    .positions{ grid-template-columns: 1fr; }
    .grid{ grid-template-columns: 1fr; }
  }
</style>
</head>

<body>
  <div class="topbar">
    <div class="inner">
      <div class="brand">
        <b>UKSS VOTING</b>
        <small>Candidate Registration & Export</small>
      </div>

      <div class="menu">
        <a class="btn" href="#register" style="text-decoration:none; display:inline-block;">Registration</a>
        <a class="btn" href="#candidates" style="text-decoration:none; display:inline-block;">Candidates</a>
        <button class="btn" id="printBtn" type="button">Print List</button>
        <button class="btn primary" id="downloadPdfBtn" type="button">Download PDF</button>
        <span class="pill" id="totalPill">Total: 0</span>
      </div>
    </div>
  </div>

  <div class="page">

    <!-- ===== Registration (center) ===== -->
    <div id="register" class="centerBox">
      <div class="card registerCard">
        <h2 class="cardTitle">Register School Candidate</h2>

        <div class="unlockBox">
          <label>Admin Password</label>
          <div class="grid">
            <input type="password" id="adminPass" placeholder="Enter admin password to unlock form" />
            <button class="btn primary" onclick="unlockForm()">UNLOCK</button>
          </div>
          <div class="hint" id="formStatusText">Status: Locked</div>
        </div>

        <div id="formArea" style="display:none;">
          <input type="hidden" id="editMode" value="none" />
          <input type="hidden" id="editID" />

          <div class="grid">
            <div>
              <label>First Name</label>
              <input type="text" id="firstName" placeholder="e.g. John" />
            </div>
            <div>
              <label>Middle Name</label>
              <input type="text" id="middleName" placeholder="e.g. Peter" />
            </div>
          </div>

          <div class="grid">
            <div>
              <label>Last Name</label>
              <input type="text" id="lastName" placeholder="e.g. Mushi" />
            </div>
            <div>
              <label>Gender</label>
              <select id="gender">
                <option value="">--Select Gender--</option>
                <option>Male</option>
                <option>Female</option>
              </select>
            </div>
          </div>

          <div class="grid">
            <div>
              <label>Class</label>
              <select id="classSelect">
                <option value="">--Select Class--</option>
                <option>Form One</option>
                <option>Form Two</option>
                <option>Form Three</option>
                <option>Form Four</option>
              </select>
            </div>
            <div>
              <label>Position</label>
              <select id="position">
                <option value="">-- Select Position --</option>

                <optgroup label="Head Boy & Head Girl">
                  <option value="headBoy">Head Boy</option>
                  <option value="headGirl">Head Girl</option>
                </optgroup>

                <optgroup label="General Secretary">
                  <option value="generalSecretaryBoy">General Secretary (Male)</option>
                  <option value="generalSecretaryGirl">General Secretary (Female)</option>
                </optgroup>

                <optgroup label="Sports & Games">
                  <option value="sportsBoy">Sports & Games (Male)</option>
                  <option value="sportsGirl">Sports & Games (Female)</option>
                </optgroup>

                <optgroup label="Food Prefect">
                  <option value="foodBoy">Food Prefect (Male)</option>
                  <option value="foodGirl">Food Prefect (Female)</option>
                </optgroup>

                <optgroup label="Environmental">
                  <option value="environmentBoy">Environmental (Male)</option>
                  <option value="environmentGirl">Environmental (Female)</option>
                </optgroup>

                <optgroup label="Health">
                  <option value="healthBoy">Health (Male)</option>
                  <option value="healthGirl">Health (Female)</option>
                </optgroup>

                <optgroup label="Maintenance">
                  <option value="maintenanceBoy">Maintenance (Male)</option>
                  <option value="maintenanceGirl">Maintenance (Female)</option>
                </optgroup>

                <optgroup label="Store Keeper">
                  <option value="storeBoy">Store Keeper (Male)</option>
                  <option value="storeGirl">Store Keeper (Female)</option>
                </optgroup>

                <optgroup label="Academic">
                  <option value="academicBoy">Academic (Male)</option>
                  <option value="academicGirl">Academic (Female)</option>
                </optgroup>

                <optgroup label="Discipline">
                  <option value="disciplineBoy">Discipline (Male)</option>
                  <option value="disciplineGirl">Discipline (Female)</option>
                </optgroup>
              </select>
            </div>
          </div>

          <div class="grid one">
            <div>
              <label>Upload Candidate Picture</label>
              <input type="file" id="photo" accept="image/*" />
            </div>
          </div>

          <div class="preview">
            <img id="previewImg" alt="preview" />
            <div class="txt" id="previewTxt">Upload photo to preview. If no photo, PDF uses boy/girl placeholder.</div>
          </div>

          <div class="rowBtns">
            <button class="btn primary" onclick="saveCandidate()">SAVE CANDIDATE</button>
            <button class="btn" onclick="resetForm()">RESET</button>
          </div>
        </div>
      </div>
    </div>

    <!-- ===== Candidates ===== -->
    <div id="candidates" class="sectionHead">
      <div>
        <h3>Candidates by Position</h3>
        <div class="sub">All competitors grouped per position</div>
      </div>
      <span class="pill" id="updatedPill">Updated: —</span>
    </div>

    <div class="positions" id="positionsGrid"></div>

  </div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-app.js";
  import { getDatabase, ref, set, remove, onValue, get }
    from "https://www.gstatic.com/firebasejs/12.5.0/firebase-database.js";
  import { getStorage, ref as sRef, uploadBytes, getDownloadURL }
    from "https://www.gstatic.com/firebasejs/12.5.0/firebase-storage.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAIabK86PrfHfzNVciI2K7aRjb8VoWyA7A",
    authDomain: "ukss-voting-system.firebaseapp.com",
    databaseURL: "https://ukss-voting-system-default-rtdb.firebaseio.com",
    projectId: "ukss-voting-system",
    storageBucket: "ukss-voting-system.appspot.com",
    messagingSenderId: "525528255065",
    appId: "1:525528255065:web:97c4e55d2984acc718bf48"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const storage = getStorage(app);

  // UI refs
  const totalPill = document.getElementById("totalPill");
  const updatedPill = document.getElementById("updatedPill");
  const formStatusText = document.getElementById("formStatusText");

  const positionsGrid = document.getElementById("positionsGrid");
  const printBtn = document.getElementById("printBtn");
  const downloadPdfBtn = document.getElementById("downloadPdfBtn");

  // Form refs
  const adminPass = document.getElementById("adminPass");
  const formArea = document.getElementById("formArea");
  const editMode = document.getElementById("editMode");
  const editID = document.getElementById("editID");

  const firstName = document.getElementById("firstName");
  const middleName = document.getElementById("middleName");
  const lastName = document.getElementById("lastName");
  const gender = document.getElementById("gender");
  const classSelect = document.getElementById("classSelect");
  const position = document.getElementById("position");
  const photo = document.getElementById("photo");

  const previewImg = document.getElementById("previewImg");
  const previewTxt = document.getElementById("previewTxt");

  // data
  let allCandidates = {};

  const BASES = ["head","generalSecretary","sports","food","environment","health","maintenance","store","academic","discipline"];

  function prettyTitle(base){
    const map = {
      head:"Head Prefect",
      generalSecretary:"General Secretary",
      sports:"Sports & Games Prefect",
      food:"Food Prefect",
      environment:"Environmental Prefect",
      health:"Health Prefect",
      maintenance:"Maintenance Prefect",
      store:"Store Keeper",
      academic:"Academic Prefect",
      discipline:"Discipline Prefect"
    };
    return map[base] || base;
  }

  function fullName(c){
    return `${c.firstName||""} ${c.middleName||""} ${c.lastName||""}`.replace(/\s+/g," ").trim();
  }

  function escapeHtml(str=""){
    return String(str)
      .replaceAll("&","&amp;")
      .replaceAll("<","&lt;")
      .replaceAll(">","&gt;")
      .replaceAll('"',"&quot;")
      .replaceAll("'","&#039;");
  }

  function placeholderDataUrl(gen){
    const isMale = String(gen||"").toLowerCase().startsWith("m");
    const bg = isMale ? "#e8f5e9" : "#f3f1e6";
    const stroke = isMale ? "#2e7d32" : "#3b6b43";
    const label = isMale ? "Boy" : "Girl";
    const svg = `
    <svg xmlns="http://www.w3.org/2000/svg" width="220" height="220" viewBox="0 0 100 100">
      <rect width="100" height="100" rx="14" fill="${bg}"/>
      <circle cx="50" cy="36" r="16" fill="${stroke}" fill-opacity="0.18"/>
      <path d="M25 86c2-18 17-28 25-28s23 10 25 28" fill="${stroke}" fill-opacity="0.16"/>
      <circle cx="50" cy="34" r="7" fill="${stroke}"/>
      <text x="50" y="93" font-size="7" fill="${stroke}" text-anchor="middle" font-family="Arial" font-weight="700">${label}</text>
    </svg>`;
    return "data:image/svg+xml;utf8," + encodeURIComponent(svg);
  }

  // unlock
  window.unlockForm = function(){
    if(adminPass.value === "ukss2025"){
      formArea.style.display = "block";
      formStatusText.textContent = "Status: Unlocked";
    } else alert("Incorrect admin password!");
  };

  // preview
  photo.addEventListener("change", function(){
    const file = this.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      previewImg.src = e.target.result;
      previewImg.style.display = "block";
      previewTxt.textContent = "Preview ready. Saving uploads photo to Firebase Storage.";
    };
    reader.readAsDataURL(file);
  });

  // load candidates
  onValue(ref(db,"candidates"), snap=>{
    allCandidates = snap.val() || {};
    totalPill.textContent = `Total: ${Object.keys(allCandidates).length}`;
    updatedPill.textContent = `Updated: ${new Date().toLocaleString()}`;
    renderCandidatesByPosition();
  });

  function baseOfPosition(pos=""){
    if(/Boy$/i.test(pos) || /Girl$/i.test(pos)) return pos.replace(/(Boy|Girl)$/i,"");
    if(/generalSecretary/i.test(pos)) return "generalSecretary";
    return pos || "";
  }

  function groupCandidates(){
    const groups = {};
    BASES.forEach(b => groups[b] = []);
    Object.entries(allCandidates || {}).forEach(([id, c])=>{
      const base = baseOfPosition(c.position || "");
      if(!groups[base]) groups[base] = [];
      groups[base].push({ id, ...c });
    });
    Object.values(groups).forEach(arr => arr.sort((a,b)=>fullName(a).localeCompare(fullName(b))));
    return groups;
  }

  function renderCandidatesByPosition(){
    const groups = groupCandidates();
    let html = "";

    for(const base of BASES){
      const list = groups[base] || [];
      html += `
        <div class="posBox">
          <div class="posTop">
            <b>${escapeHtml(prettyTitle(base))}</b>
            <span>${list.length}</span>
          </div>
          <div class="posList">
            ${
              list.length
              ? list.map(c=>{
                  const img = c.photoURL || placeholderDataUrl(c.gender);
                  return `
                    <div class="cand">
                      <img src="${escapeHtml(img)}" alt="photo">
                      <div>
                        <div class="name">${escapeHtml(fullName(c) || "-")}</div>
                        <div class="meta">${escapeHtml(c.classSelect || "-")} • ${escapeHtml(c.gender || "-")} • ${escapeHtml(c.position || "-")}</div>
                      </div>
                      <div class="act">
                        <button class="mini edit" onclick="editCandidate('${c.id}')">Edit</button>
                        <button class="mini del" onclick="deleteCandidate('${c.id}')">Delete</button>
                      </div>
                    </div>
                  `;
                }).join("")
              : `<div class="empty">No candidates registered.</div>`
            }
          </div>
        </div>
      `;
    }

    positionsGrid.innerHTML = html;
  }

  // edit
  window.editCandidate = async function(id){
    const snap = await get(ref(db,"candidates/"+id));
    if(!snap.exists()) return;
    const c = snap.val();

    editMode.value = "edit";
    editID.value = id;

    firstName.value = c.firstName || "";
    middleName.value = c.middleName || "";
    lastName.value = c.lastName || "";
    gender.value = c.gender || "";
    classSelect.value = c.classSelect || "";
    position.value = c.position || "";

    if(c.photoURL){
      previewImg.src = c.photoURL;
      previewImg.style.display = "block";
      previewTxt.textContent = "Existing photo loaded. Upload a new one only if you want to replace.";
    }else{
      previewImg.style.display = "none";
      previewTxt.textContent = "Upload photo to preview. If no photo, PDF uses boy/girl placeholder.";
    }

    location.hash = "#register";
    window.scrollTo({ top: 0, behavior: "smooth" });
  };

  // delete
  window.deleteCandidate = async function(id){
    if(confirm("Delete this candidate?")){
      await remove(ref(db,"candidates/"+id));
      alert("Deleted.");
    }
  };

  // reset
  window.resetForm = function(){
    editMode.value = "none";
    editID.value = "";
    firstName.value = "";
    middleName.value = "";
    lastName.value = "";
    gender.value = "";
    classSelect.value = "";
    position.value = "";
    photo.value = "";
    previewImg.style.display = "none";
    previewTxt.textContent = "Upload photo to preview. If no photo, PDF uses boy/girl placeholder.";
  };

  // save
  window.saveCandidate = async function(){
    const first = firstName.value.trim();
    const middle = middleName.value.trim();
    const last = lastName.value.trim();
    const gen = gender.value;
    const cls = classSelect.value;
    const pos = position.value;
    const file = photo.files[0];

    if(!first || !last || !gen || !cls || !pos){
      alert("Fill all fields.");
      return;
    }

    const id = editMode.value==="edit"
      ? editID.value
      : (first+"_"+last+"_"+pos).toLowerCase().replace(/\s+/g,"_");

    let photoURL = previewImg.src || "";

    try{
      if(file){
        const storageRef = sRef(storage, "candidates/"+id+".jpg");
        await uploadBytes(storageRef, file);
        photoURL = await getDownloadURL(storageRef);
      }

      await set(ref(db,"candidates/"+id),{
        firstName:first,
        middleName:middle,
        lastName:last,
        gender:gen,
        classSelect:cls,
        position:pos,
        photoURL
      });

      alert("Candidate saved!");
      resetForm();

    }catch(err){
      alert("Error: " + err.message);
    }
  };

  /* ===== PRINT (simple) ===== */
  printBtn.addEventListener("click", () => {
    // simplest: open browser print of current page
    window.print();
  });

  /* ===== PDF DOWNLOAD (center heading + subheading + better photos) ===== */
  async function fetchAsDataURL(url){
    const res = await fetch(url, { mode: "cors" });
    if(!res.ok) throw new Error("Image fetch failed");
    const blob = await res.blob();
    return await new Promise((resolve, reject)=>{
      const r = new FileReader();
      r.onload = ()=>resolve(String(r.result));
      r.onerror = reject;
      r.readAsDataURL(blob);
    });
  }

  async function svgToPngDataUrl(svgDataUrl){
    return await new Promise((resolve, reject)=>{
      const img = new Image();
      img.crossOrigin = "anonymous";
      img.onload = ()=>{
        const canvas = document.createElement("canvas");
        canvas.width = 140;
        canvas.height = 140;
        const ctx = canvas.getContext("2d");
        ctx.clearRect(0,0,canvas.width,canvas.height);
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        resolve(canvas.toDataURL("image/png"));
      };
      img.onerror = reject;
      img.src = svgDataUrl;
    });
  }

  downloadPdfBtn.addEventListener("click", async () => {
    const btn = downloadPdfBtn;
    const old = btn.textContent;
    btn.textContent = "Preparing PDF...";
    btn.disabled = true;

    try{
      const groups = groupCandidates();
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({ unit:"pt", format:"a4" });

      const pageW = doc.internal.pageSize.getWidth();
      const now = new Date().toLocaleString();
      const total = Object.keys(allCandidates||{}).length;

      // ===== Center heading + subheading
      doc.setFont("helvetica","bold");
      doc.setFontSize(18);
      doc.text("UKSS VOTING", pageW/2, 52, { align:"center" });

      doc.setFont("helvetica","normal");
      doc.setFontSize(11);
      doc.text("CANDIDATES LIST", pageW/2, 72, { align:"center" });
      doc.text(`Prepared: ${now}  •  Total: ${total}`, pageW/2, 88, { align:"center" });

      let y = 115;

      // preload images
      const imgMap = new Map(); // key -> dataURL
      const flat = [];
      for(const base of BASES){
        for(const c of (groups[base] || [])){
          c.__imgKey = `img_${c.id}`;
          flat.push(c);
        }
      }

      for(const c of flat){
        let dataUrl = "";
        try{
          if(c.photoURL){
            dataUrl = await fetchAsDataURL(c.photoURL);
          } else {
            dataUrl = await svgToPngDataUrl(placeholderDataUrl(c.gender));
          }
        } catch(e){
          try { dataUrl = await svgToPngDataUrl(placeholderDataUrl(c.gender)); } catch(_) { dataUrl = ""; }
        }
        imgMap.set(c.__imgKey, dataUrl);
      }

      // helper rows
      function rowsFor(list){
        return list.map(c => ([
          c.__imgKey,
          fullName(c) || "-",
          c.gender || "-",
          c.classSelect || "-"
        ]));
      }

      // draw each position section
      for(const base of BASES){
        const list = groups[base] || [];

        doc.setFont("helvetica","bold");
        doc.setFontSize(12);
        doc.text(prettyTitle(base).toUpperCase(), 40, y);
        y += 8;

        const body = list.length ? rowsFor(list) : [["", "No candidates", "-", "-"]];

        doc.autoTable({
          startY: y,
          head: [["PHOTO", "FULL NAME", "GENDER", "CLASS"]],
          body,
          margin: { left: 40, right: 40 },
          theme: "grid",
          styles: { font: "helvetica", fontSize: 9, cellPadding: 6, valign:"middle" },
          headStyles: { fontStyle: "bold" },
          columnStyles: {
            0: { cellWidth: 60 },
            1: { cellWidth: 240 },
            2: { cellWidth: 90 },
            3: { cellWidth: 90 }
          },
          didDrawCell: (data) => {
            if(data.section === "body" && data.column.index === 0){
              const key = data.cell.raw;
              if(!key) return;
              const img = imgMap.get(String(key));
              if(!img) return;

              const x = data.cell.x + 9;
              const y = data.cell.y + 6;
              const w = 42;
              const h = 42;

              // draw a light border box behind photo (clean look)
              doc.setDrawColor(200);
              doc.rect(data.cell.x + 6, data.cell.y + 6, 48, 48);

              // add image
              try{ doc.addImage(img, "PNG", x, y, w, h); }
              catch(e){
                try{ doc.addImage(img, "JPEG", x, y, w, h); }catch(_){}
              }
            }
          }
        });

        y = doc.lastAutoTable.finalY + 16;

        if(y > 760){
          doc.addPage();
          y = 60;
        }
      }

      doc.save("UKSS_Candidates_List_With_Photos.pdf");
    }catch(err){
      console.error(err);
      alert("Failed to generate PDF. If some photos are blocked, placeholders will be used.");
    }finally{
      btn.textContent = old;
      btn.disabled = false;
    }
  });
</script>

</body>
</html>
