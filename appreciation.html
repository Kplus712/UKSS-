<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Certificate of Appreciation — UKSS</title>

<!-- Libraries for PDF generation -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
:root{
  --green: #265a2f;
  --gold: #c5a106;
  --text: #05320f;
}

body{
  margin:0;
  padding:25px;
  background:#f6fff6;
  font-family:"Georgia", serif;
}

.container{
  width:900px;
  margin:auto;
  background:white;
  border:12px solid var(--gold);
  border-radius:12px;
  padding:20px;
  position:relative;
  overflow:hidden;
}

/* Watermark */
.watermark{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%);
  opacity:0.18;
  width:70%;
  z-index:0;
}

/* Header */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:3px double var(--green);
  padding-bottom:10px;
  margin-bottom:15px;
  position:relative;
  z-index:5;
}

.logo{
  width:120px;
  height:120px;
}

.header-center{
  text-align:center;
  flex:1;
}

.header-center h2{
  color:var(--green);
  margin:0;
  font-size:24px;
  letter-spacing:1px;
}

/* Title */
.title{
  text-align:center;
  margin:20px 0;
  position:relative;
  z-index:5;
}
.title h1{
  margin:0;
  font-size:32px;
  color:var(--green);
  font-weight:700;
}

/* Body text */
.body{
  font-size:18px;
  line-height:1.7;
  padding:10px 30px;
  position:relative;
  z-index:5;
}

/* Info table */
.info-table{
  width:100%;
  margin-top:15px;
  border-collapse:collapse;
}
.info-table td{
  padding:7px 4px;
  font-size:17px;
}
.label{
  font-weight:700;
  color:#2b5530;
  width:200px;
}

/* Signature block */
.signature-block{
  display:flex;
  justify-content:space-between;
  margin-top:40px;
  padding:0 30px;
}

.sign-img{
  width:200px;
  height:90px;
}

/* Loading indicator */
.loading-overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 9999;
  flex-direction: column;
  color: white;
}

.loading-spinner {
  border: 8px solid #f3f3f3;
  border-top: 8px solid #265a2f;
  border-radius: 50%;
  width: 60px;
  height: 60px;
  animation: spin 1s linear infinite;
  margin-bottom: 20px;
}

@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

/* Actions */
.actions{
  text-align:right;
  margin-top:20px;
}
.btn{
  padding:10px 14px;
  border-radius:6px;
  border:none;
  cursor:pointer;
  font-weight:bold;
  margin-left:10px;
  transition: all 0.3s;
}
.btn:hover{
  transform: translateY(-2px);
  box-shadow: 0 4px 8px rgba(0,0,0,0.2);
}
.print-btn{ 
  background:var(--green); 
  color:white; 
}
.download-btn{ 
  background:var(--gold); 
  color:white; 
}

@media print{
  .actions{ display:none; }
  body{ padding:0; background:white; }
  .container{ margin:0; border:none; }
}
</style>
</head>

<body>

<!-- Loading overlay -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-spinner"></div>
  <div>Generating Certificate PDF...</div>
</div>

<div class="container">

  <!-- Watermark -->
  <img class="watermark" src="https://raw.githubusercontent.com/Kplus712/UKSS-/main/school_log.png">

  <!-- Header -->
  <div class="header">
    <img class="logo" src="https://raw.githubusercontent.com/Kplus712/UKSS-/main/school_log.png">
    <div class="header-center">
      <h2>UMOJA KING'ORI SECONDARY SCHOOL</h2>
      <div style="color:#355b3a; font-size:14px;">Official Student Leadership Appreciation Certificate</div>
    </div>
    <img class="logo" src="https://raw.githubusercontent.com/Kplus712/UKSS-/main/school_log.png">
  </div>

  <!-- Title -->
  <div class="title">
    <h1>CERTIFICATE OF APPRECIATION</h1>
  </div>

  <!-- Body -->
  <div class="body">
    <p id="contentParagraph"></p>

    <table class="info-table">
      <tr><td class="label">Student Name:</td><td id="studentName"></td></tr>
      <tr><td class="label">Position:</td><td id="positionName"></td></tr>
      <tr><td class="label">Class:</td><td id="studentClass"></td></tr>
      <tr><td class="label">Gender:</td><td id="studentGender"></td></tr>
      <tr><td class="label">Votes Received:</td><td id="votesCount"></td></tr>
      <tr><td class="label">Certificate Serial:</td><td id="serialNumber"></td></tr>
      <tr><td class="label">Election Year:</td><td id="yearLabel"></td></tr>
    </table>

    <!-- Signature block -->
    <div class="signature-block">
      <div>
        <img class="sign-img" src="https://raw.githubusercontent.com/Kplus712/UKSS-/main/hm_sign.jpeg">
        <div style="font-size:14px; color:#2d4d2b; margin-top:-6px;">
          <b>Headmaster</b><br>
          Umoja King'ori Secondary School
        </div>
      </div>

      <div style="text-align:right;">
        <div>Date:</div>
        <div id="todayDate" style="font-weight:bold; font-size:18px;"></div>
      </div>
    </div>

  </div>

  <!-- Buttons -->
  <div class="actions">
    <button class="btn print-btn" onclick="window.print()">Print Certificate</button>
    <button class="btn download-btn" id="downloadBtn">Download PDF</button>
  </div>

</div>

<script>
// ALL POSITION CODES
const POS_CODES = {
  "headboy": "HB",
  "headgirl": "HG",
  "academic": "AP",
  "generalsecretary": "GS",
  "discipline": "DP",
  "sports": "SG",
  "environmental": "EP",
  "food": "FP",
  "storekeeper": "SK",
  "health": "HP",
  "maintenance": "MP"
};

// Smart position formatting
function formatPosition(pos){
  let p = pos.toLowerCase().trim();

  if(p.includes("head boy")) return "Head Boy";
  if(p.includes("headgirl") || p.includes("head girl")) return "Head Girl";
  if(p.includes("general")) return "General Secretary";

  // prevent double 'Prefect'
  if(p.includes("prefect")){
    let clean = p.replace("prefect","").trim();
    return clean.charAt(0).toUpperCase() + clean.slice(1) + " Prefect";
  }

  return p.charAt(0).toUpperCase() + p.slice(1) + " Prefect";
}

// Normalize for serial code
function positionKey(raw){
  return raw.toLowerCase()
            .replace(/prefect/g,"")
            .replace(/girl/g,"")
            .replace(/boy/g,"")
            .replace(/general secretary/,"generalsecretary")
            .replace(/\s+/g,"")
            .trim();
}

function getParams(){
  const p = new URLSearchParams(window.location.search);
  return {
    name: p.get("name") || "",
    position: p.get("position") || "",
    votes: p.get("votes") || "",
    class: p.get("candidateClass") || "",
    gender: p.get("candidateGender") || "",
    year: p.get("year") || new Date().getFullYear()
  };
}

function fillPage(){
  const p = getParams();

  const formattedPos = formatPosition(p.position);

  document.getElementById("studentName").textContent = p.name;
  document.getElementById("positionName").textContent = formattedPos;
  document.getElementById("votesCount").textContent = p.votes;
  document.getElementById("studentClass").textContent = p.class;
  document.getElementById("studentGender").textContent = p.gender;
  document.getElementById("yearLabel").textContent = p.year;
  document.getElementById("todayDate").textContent = new Date().toLocaleDateString();

  // Serial Generator
  const key = positionKey(p.position);
  const code = POS_CODES[key] || "XX";
  const serial = `UKSS/${p.year}/${code}/${String(Math.floor(Math.random()*9999)).padStart(4,'0')}`;
  document.getElementById("serialNumber").textContent = serial;

  // Content paragraph
  document.getElementById("contentParagraph").innerHTML =
    `This certificate is proudly awarded to <strong>${p.name}</strong> for demonstrating outstanding 
     leadership, discipline, and integrity while serving as the <strong>${formattedPos}</strong> 
     during the ${p.year} UKSS elections. Your dedication and exemplary conduct are highly appreciated.`;
}

// Function to download certificate as PDF
async function downloadCertificate() {
  const loadingOverlay = document.getElementById('loadingOverlay');
  const container = document.querySelector('.container');
  
  try {
    // Show loading overlay
    loadingOverlay.style.display = 'flex';
    
    // Create a copy of the container for PDF generation
    const containerClone = container.cloneNode(true);
    
    // Remove buttons from the clone
    const actionsDiv = containerClone.querySelector('.actions');
    if (actionsDiv) {
      actionsDiv.remove();
    }
    
    // Set the clone to be visible but off-screen
    containerClone.style.position = 'absolute';
    containerClone.style.left = '-9999px';
    containerClone.style.top = '0';
    document.body.appendChild(containerClone);
    
    // Use html2canvas to capture the certificate as an image
    const canvas = await html2canvas(containerClone, {
      scale: 2, // Higher quality
      useCORS: true, // Allow cross-origin images
      backgroundColor: '#ffffff'
    });
    
    // Remove the clone from DOM
    document.body.removeChild(containerClone);
    
    // Get certificate info for filename
    const params = getParams();
    const fileName = `UKSS_Certificate_${params.name.replace(/\s+/g, '_')}_${params.year}.pdf`;
    
    // Convert canvas to image data
    const imgData = canvas.toDataURL('image/jpeg', 1.0);
    
    // Create PDF using jsPDF
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({
      orientation: 'landscape',
      unit: 'mm',
      format: 'a4'
    });
    
    // Calculate dimensions to fit certificate in A4
    const pdfWidth = pdf.internal.pageSize.getWidth();
    const pdfHeight = pdf.internal.pageSize.getHeight();
    const imgWidth = canvas.width;
    const imgHeight = canvas.height;
    const ratio = Math.min(pdfWidth / imgWidth, pdfHeight / imgHeight) * 0.95;
    const imgX = (pdfWidth - imgWidth * ratio) / 2;
    const imgY = (pdfHeight - imgHeight * ratio) / 2;
    
    // Add the image to PDF
    pdf.addImage(imgData, 'JPEG', imgX, imgY, imgWidth * ratio, imgHeight * ratio);
    
    // Save the PDF
    pdf.save(fileName);
    
    // Hide loading overlay
    loadingOverlay.style.display = 'none';
    
  } catch (error) {
    console.error('Error generating PDF:', error);
    loadingOverlay.style.display = 'none';
    alert('Sorry, there was an error generating the PDF. Please try printing instead.');
  }
}

// Initialize page
document.addEventListener('DOMContentLoaded', function() {
  fillPage();
  
  // Add event listener to download button
  document.getElementById('downloadBtn').addEventListener('click', downloadCertificate);
  
  // Also allow triggering download via URL parameter
  const urlParams = new URLSearchParams(window.location.search);
  if (urlParams.get('download') === 'true') {
    setTimeout(downloadCertificate, 1000);
  }
});
</script>

</body>
</html>
