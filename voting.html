<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>UKSS Voting — Official (Offline-ready)</title>

<!-- LocalForage (IndexedDB wrapper) for offline queue -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script>

<style>
  :root{
    --green:#1b5e20;
    --bg:#f4fff4;
    --card:#e8f5e9;
    --accent:#2e7d32;
  }
  *{box-sizing:border-box}
  body{
    margin:0;
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
    background:var(--bg);
    color:#123;
    padding:20px;
  }
  .container{
    max-width:1100px; margin:20px auto; background:white; border-radius:12px;
    padding:18px; border:5px solid var(--accent); box-shadow:0 6px 24px rgba(0,0,0,0.08);
  }
  h1{ text-align:center; color:var(--accent); margin:6px 0 12px; }
  p.lead{ text-align:center; color:#2e7d32; margin-top:0; font-weight:600; }
  .position-block{ margin:28px 0; position:relative; }
  .position-title{
    text-align:center; font-weight:800; color:var(--green);
    font-size:18px; letter-spacing:0.6px; margin-bottom:12px;
    text-transform:uppercase;
  }

  /* landscape row: left = girls, center = spacer/title area, right = boys */
  .landscape-row{
    display:flex; gap:12px; align-items:flex-start;
    flex-wrap:nowrap; justify-content:space-between;
  }
  .column { width:48%; display:flex; flex-direction:column; gap:10px; }

  /* candidate card */
  .candidate-card{
    display:flex; gap:12px; align-items:center;
    background:var(--card); padding:10px; border-radius:10px;
    border:2px solid rgba(46,125,50,0.08);
  }
  .candidate-card img{
    width:96px; height:96px; object-fit:cover; border-radius:8px; border:3px solid var(--accent);
  }
  .candidate-info h3{ margin:0; font-size:16px; color:#15491a; }
  .candidate-info p{ margin:4px 0 0; font-size:13px; color:#21572a; }

  .vote-row{ margin-top:8px; }
  .vote-row label{ font-weight:700; color:#083f20; cursor:pointer; user-select:none; }
  input[type="radio"]{ margin-right:8px; transform:scale(1.02); }

  .center-col{
    width:4%; min-width:60px; display:flex; align-items:center; justify-content:center;
    color:#2e7d32; font-weight:700; font-size:12px;
  }

  /* buttons */
  .actions{
    display:flex; gap:12px; margin-top:22px; justify-content:space-between;
    align-items:center; flex-wrap:wrap;
  }
  .btn{
    padding:12px 18px; border-radius:10px; border:none; background:var(--accent);
    color:white; cursor:pointer; font-weight:800;
  }
  .btn.secondary{
    background:#c8e6c9; color:var(--green); font-weight:700; border:2px solid rgba(38,90,47,0.06);
  }

  /* network status indicator */
  .netStatus{
    position:fixed; right:18px; top:18px; background:#fff; padding:8px 10px; border-radius:8px;
    border:2px solid var(--accent); font-weight:700; color:var(--accent); z-index:9999;
    box-shadow:0 6px 18px rgba(0,0,0,0.06);
  }

  /* responsive */
  @media (max-width:900px){
    .landscape-row{ flex-direction:column; }
    .column{ width:100%; }
    .center-col{ display:none; }
  }

  /* ================= SWEET POPUP (Centered) ================= */
  .sweet-overlay{
    position:fixed; inset:0;
    background:rgba(0,0,0,0.45);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:10000;
    padding:18px;
  }
  .sweet-popup{
    width:min(420px, 92vw);
    background:#fff;
    border-radius:16px;
    border:4px solid rgba(46,125,50,0.18);
    box-shadow:0 18px 45px rgba(0,0,0,0.22);
    padding:18px 16px;
    text-align:center;
    transform: translateY(8px);
    animation: popIn .18s ease-out forwards;
  }
  @keyframes popIn{
    to{ transform: translateY(0); }
  }
  .sweet-icon{
    width:64px; height:64px;
    margin:2px auto 10px;
    border-radius:50%;
    display:grid;
    place-items:center;
    background:rgba(46,125,50,0.10);
    border:3px solid rgba(46,125,50,0.35);
  }
  .sweet-icon svg{ width:34px; height:34px; }
  .sweet-title{
    font-weight:900;
    color:var(--green);
    font-size:18px;
    margin:0 0 6px;
  }
  .sweet-msg{
    margin:0;
    color:#214b28;
    font-weight:700;
    font-size:14px;
    line-height:1.35;
  }
  .sweet-small{
    margin-top:10px;
    font-size:12px;
    color:#4a6a50;
    font-weight:700;
  }
</style>
</head>

<body>
  <div class="netStatus" id="netStatus">Network: —</div>

  <div class="container">
    <h1>🗳️ UKSS VOTING</h1>
    <p class="lead">Choose leaders carefully — girls left, boys right. General Secretary: choose one (male or female).</p>

    <div id="positionsArea">Loading candidates...</div>

    <div class="actions">
      <button class="btn" id="submitBtn">SUBMIT VOTE</button>
      <button class="btn secondary" id="refreshBtn">Refresh Candidates</button>
    </div>
  </div>

  <!-- Sweet Popup -->
  <div id="sweetOverlay" class="sweet-overlay" aria-hidden="true">
    <div class="sweet-popup" role="dialog" aria-modal="true" aria-label="Vote status">
      <div class="sweet-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M20 6L9 17l-5-5" stroke="#2e7d32" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="sweet-title" id="sweetTitle">Success</div>
      <p class="sweet-msg" id="sweetMsg">Your vote recorded successfully.</p>
      <div class="sweet-small" id="sweetSmall">Logging out...</div>
    </div>
  </div>

<script type="module">
/* ================= Configuration ================= */
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-app.js";
import { getDatabase, ref, get, set, update, onValue } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-database.js";

/* --- Firebase config (unchanged) --- */
const firebaseConfig = {
  apiKey: "AIzaSyAIabK86PrfHfzNVciI2K7aRjb8VoWyA7A",
  authDomain: "ukss-voting-system.firebaseapp.com",
  databaseURL: "https://ukss-voting-system-default-rtdb.firebaseio.com",
  projectId: "ukss-voting-system",
  storageBucket: "ukss-voting-system.appspot.com",
  messagingSenderId: "525528255065",
  appId: "1:525528255065:web:97c4e55d2984acc718bf48"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* ============== VOTER SESSION (from localStorage) ============== */
const voterID = localStorage.getItem("voterID");
const fname = localStorage.getItem("firstName") || "";
const mname = localStorage.getItem("middleName") || "";
const lname = localStorage.getItem("lastName") || "";
const classSelect = localStorage.getItem("classSelect") || "";
const gender = localStorage.getItem("gender") || "";

if(!voterID){
  alert("You are not registered. Redirecting to home.");
  location.href = "index.html";
}

/* ============== LocalForage setup (offline queue) ============== */
localforage.config({
  name: 'ukss_offline',
  storeName: 'vote_queue'
});
const QUEUE_KEY = 'pending_votes_queue_v1';

async function getQueue(){
  const q = await localforage.getItem(QUEUE_KEY);
  return Array.isArray(q) ? q : [];
}
async function setQueue(arr){ await localforage.setItem(QUEUE_KEY, arr); }
async function enqueueVote(voteObj){
  const q = await getQueue();
  q.push(voteObj);
  await setQueue(q);
}
async function dequeueOne(){
  const q = await getQueue();
  if(q.length === 0) return null;
  const item = q.shift();
  await setQueue(q);
  return item;
}

/* ============== Helper: placeholder SVG dataURI ============== */
function placeholderDataUrl(gender){
  const isMale = String(gender||"").toLowerCase().startsWith("m");
  const bg = isMale ? "#dff0d9" : "#f1efe5";
  const color = isMale ? "#2e7d32" : "#4a7a4a";
  const svg = `<svg xmlns='http://www.w3.org/2000/svg' width='220' height='220' viewBox='0 0 100 100'>
    <rect width='100' height='100' rx='12' fill='${bg}'/>
    <circle cx='50' cy='32' r='14' fill='${color}' fill-opacity='0.18'/>
    <circle cx='50' cy='32' r='6' fill='${color}'/>
    <rect x='20' y='58' width='60' height='22' rx='8' fill='${color}' fill-opacity='0.12'/>
    <text x='50' y='88' font-size='6' fill='${color}' text-anchor='middle' font-family='Arial'>${isMale ? 'Boy' : 'Girl'}</text>
  </svg>`;
  return "data:image/svg+xml;utf8," + encodeURIComponent(svg);
}

/* ============== Utility: text prettify for position titles ============== */
function prettyTitle(posKey){
  const map = {
    head: "Head Prefect",
    generalSecretary: "General Secretary",
    sports: "Sports & Games Prefect",
    food: "Food Prefect",
    environment: "Environmental Prefect",
    health: "Health Prefect",
    maintenance: "Maintenance Prefect",
    store: "Store Keeper",
    academic: "Academic Prefect",
    discipline: "Discipline Prefect"
  };
  const base = posKey.replace(/(Boy|Girl)$/i, "");
  return map[base] || base.replace(/([A-Z])/g," $1").trim();
}

/* ============== Fetch & Render candidates ============== */
const positionsArea = document.getElementById("positionsArea");
let latestCandidates = {}; // snapshot cache

function groupCandidatesByBase(candidatesObj){
  const groups = {};
  Object.entries(candidatesObj || {}).forEach(([id, c])=>{
    const pos = c.position || "";
    let base = pos;

    if(/Boy$/i.test(pos) || /Girl$/i.test(pos)){
      base = pos.replace(/(Boy|Girl)$/i, "");
    } else if(/generalSecretary/i.test(pos)){
      base = "generalSecretary";
    }

    if(!groups[base]) groups[base] = { girls:[], boys:[] };

    const candidate = { id, ...c };
    const g = (c.gender||"").toLowerCase();

    if(/female|girl|f/i.test(g) || /Girl$/i.test(pos)) groups[base].girls.push(candidate);
    else groups[base].boys.push(candidate);
  });

  return groups;
}

function buildCandidateCardHTML(c, radioName){
  const fullname = `${c.firstName||""} ${c.middleName||""} ${c.lastName||""}`.trim();
  const photo = c.photoURL || placeholderDataUrl(c.gender);
  return `
    <div class="candidate-card" data-id="${c.id}">
      <img src="${photo}" alt="${fullname}">
      <div class="candidate-info">
        <h3>${fullname}</h3>
        <p>${c.classSelect || ""} ${c.gender ? " • " + c.gender : ""}</p>
        <div class="vote-row">
          <label><input type="radio" name="${radioName}" value="${fullname}"> Select</label>
        </div>
      </div>
    </div>
  `;
}

function renderCandidates(snapshotObj){
  latestCandidates = snapshotObj || {};
  const groups = groupCandidatesByBase(snapshotObj || {});

  const naturalOrder = ["head","generalSecretary","sports","food","environment","health","maintenance","store","academic","discipline"];
  const presentBases = Object.keys(groups);
  const ordered = [];
  naturalOrder.forEach(b => { if(presentBases.includes(b)) ordered.push(b); });
  presentBases.forEach(b => { if(!ordered.includes(b)) ordered.push(b); });

  let out = "";
  for(const base of ordered){
    const grp = groups[base];
    if(!grp) continue;

    out += `<div class="position-block" data-base="${base}">`;
    out += `<div class="position-title">${prettyTitle(base)}</div>`;

    if(base === "generalSecretary"){
      out += `<div class="landscape-row">`;
      out += `<div class="column">`;
      if(grp.girls.length === 0) out += `<div style="color:#556; font-style:italic">No female candidates</div>`;
      grp.girls.forEach(c => out += buildCandidateCardHTML(c, "generalSecretary"));
      out += `</div>`;
      out += `<div class="center-col">VS</div>`;
      out += `<div class="column">`;
      if(grp.boys.length === 0) out += `<div style="color:#556; font-style:italic">No male candidates</div>`;
      grp.boys.forEach(c => out += buildCandidateCardHTML(c, "generalSecretary"));
      out += `</div>`;
      out += `</div>`;
    } else {
      out += `<div class="landscape-row">`;
      out += `<div class="column">`;
      if(grp.girls.length === 0) out += `<div style="color:#556; font-style:italic">No female candidates</div>`;
      grp.girls.forEach(c => out += buildCandidateCardHTML(c, base + "Girl"));
      out += `</div>`;
      out += `<div class="center-col"></div>`;
      out += `<div class="column">`;
      if(grp.boys.length === 0) out += `<div style="color:#556; font-style:italic">No male candidates</div>`;
      grp.boys.forEach(c => out += buildCandidateCardHTML(c, base + "Boy"));
      out += `</div>`;
      out += `</div>`;
    }

    out += `</div>`;
  }

  positionsArea.innerHTML = out;
}

/* ============== Live listener ============== */
const candidatesRef = ref(db, "candidates");
onValue(candidatesRef, snap => {
  const data = snap.val();
  if(!data){
    positionsArea.innerHTML = `<div style="padding:20px;color:#556">No candidates registered yet.</div>`;
    latestCandidates = {};
    return;
  }
  renderCandidates(data);
});

/* ============== Network status handling & sync loop ============== */
const netStatusEl = document.getElementById('netStatus');
function updateNetworkUI(){
  if(navigator.onLine){
    netStatusEl.textContent = 'Network: ONLINE';
    netStatusEl.style.borderColor = '#2e7d32';
  } else {
    netStatusEl.textContent = 'Network: OFFLINE (votes queued)';
    netStatusEl.style.borderColor = '#c62828';
  }
}
window.addEventListener('online', () => { updateNetworkUI(); startSyncLoop(); });
window.addEventListener('offline', () => { updateNetworkUI(); });
updateNetworkUI();

/* Sync loop: tries to sync pending votes every 5 seconds when online */
let syncIntervalId = null;
function startSyncLoop(){
  if(syncIntervalId) return;
  syncIntervalId = setInterval(async () => {
    if(!navigator.onLine) return;

    let item = await dequeueOne();
    while(item){
      try{
        await set(ref(db, "votes/" + item.voterID), item);
        try { await update(ref(db, "voters/" + item.voterID), { hasVoted: true }); } catch(e){}
        item = await dequeueOne();
      } catch(err){
        const q = await getQueue();
        q.unshift(item);
        await setQueue(q);
        console.error("Sync failed, will retry:", err);
        break;
      }
    }
  }, 5000);
}
if(navigator.onLine) startSyncLoop();

/* ================= SWEET POPUP + LOGOUT ================= */
const sweetOverlay = document.getElementById("sweetOverlay");
const sweetTitle = document.getElementById("sweetTitle");
const sweetMsg = document.getElementById("sweetMsg");
const sweetSmall = document.getElementById("sweetSmall");

function logoutToEntryPage(){
  // clear only session keys used by your voting flow
  localStorage.removeItem("voterID");
  localStorage.removeItem("firstName");
  localStorage.removeItem("middleName");
  localStorage.removeItem("lastName");
  localStorage.removeItem("classSelect");
  localStorage.removeItem("gender");
  // NOTE: we keep hasVoted_local_ID so they can't re-vote from same device
  location.href = "index.html"; // entry/login page
}

function showSweetSuccessAndLogout(fullName){
  const cleanName = (fullName || "").trim() || "Student";
  sweetTitle.textContent = "SUCCESS";
  sweetMsg.textContent = `${cleanName}, your vote recorded successfully.`;
  sweetSmall.textContent = "Logging out...";
  sweetOverlay.style.display = "flex";
  sweetOverlay.setAttribute("aria-hidden", "false");

  // after 3 seconds -> logout
  setTimeout(() => {
    sweetOverlay.style.display = "none";
    sweetOverlay.setAttribute("aria-hidden", "true");
    logoutToEntryPage();
  }, 3000);
}

/* ============== Voting submission logic ============== */
document.getElementById("submitBtn").addEventListener("click", async () => {
  const blocks = document.querySelectorAll(".position-block");
  const votes = {};

  for(const block of blocks){
    const base = block.dataset.base;
    if(!base) continue;

    if(base === "generalSecretary"){
      const sel = block.querySelector('input[name="generalSecretary"]:checked');
      if(!sel){
        alert(`Please choose a candidate for: ${prettyTitle(base)}`);
        return;
      }
      votes["generalSecretary"] = sel.value;
    } else {
      const selG = block.querySelector(`input[name="${base}Girl"]:checked`);
      const selB = block.querySelector(`input[name="${base}Boy"]:checked`);
      if(!selG || !selB){
        alert(`Please choose both female and male for: ${prettyTitle(base)} (girls left, boys right)`);
        return;
      }
      votes[base + "Girl"] = selG.value;
      votes[base + "Boy"] = selB.value;
    }
  }

  // local prevention of double-vote
  const localVotedFlag = localStorage.getItem("hasVoted_local_" + voterID);
  if(localVotedFlag === "true"){
    alert("You have already voted (local). Duplicate voting not allowed.");
    return;
  }

  // server check (best-effort)
  try {
    const voterSnap = await get(ref(db, "voters/" + voterID));
    if(voterSnap.exists() && voterSnap.val().hasVoted){
      alert("You have already voted (server). Duplicate voting not allowed.");
      return;
    }
  } catch(e){
    console.warn("Server check failed (likely offline):", e);
  }

  const fullName = `${fname} ${mname} ${lname}`.trim();

  // Save votes object
  const voteObj = {
    voterID,
    name: fullName,
    class: classSelect,
    gender,
    votes,
    timestamp: new Date().toISOString(),
    queued: !navigator.onLine
  };

  try{
    if(navigator.onLine){
      await set(ref(db, "votes/" + voterID), voteObj);
      await update(ref(db, "voters/" + voterID), { hasVoted: true });
      localStorage.setItem("hasVoted_local_" + voterID, "true");
    } else {
      // offline: store in queue and mark local voted flag
      await enqueueVote(voteObj);
      localStorage.setItem("hasVoted_local_" + voterID, "true");
    }
  } catch(err){
    alert("Failed to save your vote: " + (err.message||err));
    console.error(err);
    return;
  }

  // hide submit immediately
  document.getElementById("submitBtn").style.display = 'none';

  // ✅ sweet popup (3 sec) then logout to entry page
  showSweetSuccessAndLogout(fullName);
});

/* ============== Refresh button ============== */
document.getElementById("refreshBtn").addEventListener("click", async () => {
  try {
    const snap = await get(candidatesRef);
    renderCandidates(snap.val() || {});
    alert("Candidates refreshed.");
  } catch(err){
    alert("Refresh failed: " + (err.message||err));
  }
});

/* ============== Keep UI updated for network status (poll) ============== */
setInterval(updateNetworkUI, 2000);

/* ======= start sync immediately if online ======= */
(async () => {
  if(navigator.onLine) startSyncLoop();
  updateNetworkUI();
})();
</script>
</body>
</html>
