<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>UKSS System Settings</title>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  :root {
    --primary: #1b5e20;
    --primary-light: #2e7d32;
    --primary-soft: #e8f5e9;
    --accent: #ffb74d;
    --accent-light: #ffe0b2;
    --danger: #c62828;
    --danger-light: #ffcdd2;
    --gray: #5b6b60;
    --light-gray: #f0f4f0;
    --dark: #1f2a1f;
    --white: #ffffff;
    --border: rgba(46, 125, 50, 0.15);
    --shadow: 0 10px 30px -10px rgba(27, 94, 32, 0.2);
    --shadow-lg: 0 20px 40px -10px rgba(0, 40, 0, 0.3);
    --radius: 20px;
    --radius-sm: 12px;
  }

  body {
    font-family: 'Inter', 'Segoe UI', Roboto, system-ui, sans-serif;
    background: linear-gradient(145deg, #f0f7f0 0%, #e2efe2 100%);
    color: var(--dark);
    padding: 30px;
    min-height: 100vh;
  }

  .settings-container {
    max-width: 1200px;
    margin: 0 auto;
  }

  /* Header */
  .settings-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--white);
    border-radius: 30px;
    padding: 20px 30px;
    margin-bottom: 30px;
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 15px;
  }

  .logo-icon {
    width: 55px;
    height: 55px;
    background: linear-gradient(135deg, var(--primary), var(--primary-light));
    border-radius: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 26px;
  }

  .header-title h1 {
    color: var(--primary);
    font-size: 2rem;
    font-weight: 800;
    margin: 0;
  }

  .header-title .subtitle {
    color: var(--gray);
    font-size: 0.95rem;
    margin-top: 5px;
  }

  .back-btn {
    background: var(--light-gray);
    color: var(--dark);
    border: 2px solid var(--border);
    padding: 12px 24px;
    border-radius: 40px;
    font-weight: 700;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    transition: all 0.3s;
    text-decoration: none;
    color: var(--dark);
  }

  .back-btn:hover {
    background: var(--primary-soft);
    transform: translateY(-2px);
  }

  /* Settings Grid */
  .settings-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
    gap: 25px;
  }

  .settings-card {
    background: var(--white);
    border-radius: 24px;
    padding: 25px;
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
    transition: transform 0.3s;
  }

  .settings-card:hover {
    transform: translateY(-5px);
    box-shadow: var(--shadow-lg);
  }

  .card-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
    padding-bottom: 15px;
    border-bottom: 2px solid var(--border);
  }

  .card-header i {
    font-size: 28px;
    color: var(--accent);
  }

  .card-header h2 {
    color: var(--primary);
    font-size: 1.3rem;
  }

  .status-badge {
    display: inline-block;
    padding: 8px 16px;
    border-radius: 40px;
    font-weight: 700;
    font-size: 1rem;
    margin-bottom: 20px;
  }

  .status-open {
    background: var(--primary-soft);
    color: var(--primary);
    border: 2px solid var(--primary);
  }

  .status-closed {
    background: var(--danger-light);
    color: var(--danger);
    border: 2px solid var(--danger);
  }

  .toggle-container {
    display: flex;
    align-items: center;
    gap: 15px;
    margin: 20px 0;
  }

  .switch {
    position: relative;
    display: inline-block;
    width: 60px;
    height: 34px;
  }

  .switch input {
    opacity: 0;
    width: 0;
    height: 0;
  }

  .slider {
    position: absolute;
    cursor: pointer;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background-color: #ccc;
    transition: .4s;
    border-radius: 34px;
  }

  .slider:before {
    position: absolute;
    content: "";
    height: 26px;
    width: 26px;
    left: 4px;
    bottom: 4px;
    background-color: white;
    transition: .4s;
    border-radius: 50%;
  }

  input:checked + .slider {
    background-color: var(--primary);
  }

  input:checked + .slider:before {
    transform: translateX(26px);
  }

  .btn {
    background: var(--primary);
    color: white;
    border: none;
    padding: 12px 20px;
    border-radius: 40px;
    font-weight: 700;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    transition: all 0.3s;
    margin-right: 10px;
    margin-bottom: 10px;
  }

  .btn-danger {
    background: var(--danger);
  }

  .btn-warning {
    background: var(--accent);
    color: var(--dark);
  }

  .btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 15px rgba(0,0,0,0.2);
  }

  .input-group {
    margin: 20px 0;
  }

  .input-group label {
    display: block;
    font-weight: 600;
    color: var(--gray);
    margin-bottom: 8px;
  }

  .input-group select,
  .input-group input {
    width: 100%;
    padding: 14px 18px;
    border-radius: 40px;
    border: 2px solid var(--border);
    font-size: 14px;
    background: white;
  }

  .input-group select:focus,
  .input-group input:focus {
    border-color: var(--primary);
    outline: none;
    box-shadow: 0 0 0 4px rgba(46, 125, 50, 0.1);
  }

  .history-list {
    margin-top: 20px;
    max-height: 300px;
    overflow-y: auto;
  }

  .history-item {
    background: var(--primary-soft);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 15px;
    margin-bottom: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .history-item-info h4 {
    color: var(--primary);
    margin-bottom: 5px;
  }

  .history-item-info p {
    font-size: 0.9rem;
    color: var(--gray);
  }

  .history-actions {
    display: flex;
    gap: 8px;
  }

  .small-btn {
    background: var(--primary);
    color: white;
    border: none;
    padding: 8px 12px;
    border-radius: 30px;
    font-size: 0.85rem;
    cursor: pointer;
  }

  .small-btn.unarchive {
    background: var(--accent);
    color: var(--dark);
  }

  /* Success Message */
  .success-message {
    position: fixed;
    top: 20px;
    right: 20px;
    background: linear-gradient(145deg, var(--primary), var(--primary-light));
    color: white;
    padding: 15px 25px;
    border-radius: 50px;
    box-shadow: var(--shadow-lg);
    display: none;
    align-items: center;
    gap: 10px;
    z-index: 10000;
    animation: slideIn 0.3s ease;
  }

  @keyframes slideIn {
    from { transform: translateX(100%); }
    to { transform: translateX(0); }
  }

  .loading {
    text-align: center;
    padding: 40px;
    color: var(--gray);
  }

  .loading i {
    font-size: 48px;
    color: var(--primary);
    margin-bottom: 15px;
  }

  @media (max-width: 768px) {
    body { padding: 15px; }
    .settings-header { flex-direction: column; align-items: flex-start; gap: 15px; }
    .settings-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- Success Message -->
<div id="successMessage" class="success-message">
  <i class="fas fa-check-circle"></i>
  <span id="successText">Settings updated successfully!</span>
</div>

<div class="settings-container">

  <!-- Header -->
  <div class="settings-header">
    <div class="header-left">
      <div class="logo-icon">
        <i class="fas fa-cog"></i>
      </div>
      <div class="header-title">
        <h1>System Settings</h1>
        <div class="subtitle">Configure and manage your voting system</div>
      </div>
    </div>
    <a href="admin.html" class="back-btn">
      <i class="fas fa-arrow-left"></i> Back to Dashboard
    </a>
  </div>

  <!-- Settings Grid -->
  <div class="settings-grid" id="settingsGrid">
    <!-- Loading State -->
    <div class="loading" id="loadingState">
      <i class="fas fa-spinner fa-pulse"></i>
      <p>Loading settings...</p>
    </div>
  </div>

</div>

<!-- Full Page History Modal -->
<div id="historyFullModal" style="display:none; position:fixed; inset:0; background:white; z-index:10000; overflow-y:auto; padding:40px;">
  <div style="max-width:1200px; margin:0 auto;">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
      <h1 style="color:var(--primary);"><i class="fas fa-history"></i> Archived Elections</h1>
      <button onclick="closeHistoryFullModal()" style="background:var(--danger); color:white; border:none; width:50px; height:50px; border-radius:50%; font-size:24px; cursor:pointer;"><i class="fas fa-times"></i></button>
    </div>
    <div id="fullHistoryList" style="display:grid; grid-template-columns:repeat(auto-fit, minmax(300px,1fr)); gap:20px;"></div>
  </div>
</div>

<script>
// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyAIabK86PrfHfzNVciI2K7aRjb8VoWyA7A",
  authDomain: "ukss-voting-system.firebaseapp.com",
  databaseURL: "https://ukss-voting-system-default-rtdb.firebaseio.com",
  projectId: "ukss-voting-system",
  storageBucket: "ukss-voting-system.appspot.com",
  messagingSenderId: "525528255065",
  appId: "1:525528255065:web:97c4e55d2984acc718bf48"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const storage = firebase.storage();

// DOM Elements
const settingsGrid = document.getElementById("settingsGrid");
const loadingState = document.getElementById("loadingState");
const successMessage = document.getElementById("successMessage");
const successText = document.getElementById("successText");

// Show success message
function showSuccess(msg) {
  successText.textContent = msg;
  successMessage.style.display = "flex";
  setTimeout(() => {
    successMessage.style.display = "none";
  }, 3000);
}

// Load all settings
async function loadSettings() {
  loadingState.style.display = "block";
  
  try {
    // Load system status
    const systemSnap = await db.ref("system").once("value");
    const system = systemSnap.val() || {};
    const votingOpen = system.votingOpen !== false;
    
    // Load history
    const historySnap = await db.ref("history").once("value");
    const history = historySnap.val() || {};
    
    // Load counts
    const votesSnap = await db.ref("votes").once("value");
    const votersSnap = await db.ref("voters").once("value");
    const candidatesSnap = await db.ref("candidates").once("value");
    
    const votesCount = Object.keys(votesSnap.val() || {}).length;
    const votersCount = Object.keys(votersSnap.val() || {}).length;
    const candidatesCount = Object.keys(candidatesSnap.val() || {}).length;
    const historyCount = Object.keys(history).length;
    
    renderSettings(votingOpen, votesCount, votersCount, candidatesCount, historyCount, history);
    
  } catch (error) {
    console.error("Error loading settings:", error);
    settingsGrid.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:40px; color:var(--danger);"><i class="fas fa-exclamation-triangle fa-3x"></i><p>Error loading settings: ${error.message}</p></div>`;
  } finally {
    loadingState.style.display = "none";
  }
}

// Render settings cards
function renderSettings(votingOpen, votesCount, votersCount, candidatesCount, historyCount, history) {
  const statusClass = votingOpen ? "status-open" : "status-closed";
  const statusText = votingOpen ? "🟢 VOTING OPEN" : "🔴 VOTING CLOSED";
  
  let historyHtml = '';
  const historyEntries = Object.entries(history).sort((a, b) => {
    return new Date(b[1].archivedAt || 0) - new Date(a[1].archivedAt || 0);
  }).slice(0, 5);
  
  historyEntries.forEach(([key, data]) => {
    const votes = Object.keys(data.votes || {}).length;
    const date = data.archivedAt ? new Date(data.archivedAt).toLocaleDateString() : 'Unknown';
    historyHtml += `
      <div class="history-item">
        <div class="history-item-info">
          <h4><i class="fas fa-archive"></i> ${key}</h4>
          <p>${votes} votes • ${date}</p>
        </div>
        <div class="history-actions">
          <button class="small-btn" onclick="viewFullHistory('${key}')"><i class="fas fa-eye"></i> View</button>
          <button class="small-btn unarchive" onclick="unarchiveHistory('${key}')"><i class="fas fa-undo"></i> Unarchive</button>
        </div>
      </div>
    `;
  });
  
  if (historyHtml === '') {
    historyHtml = '<p style="text-align:center; color:var(--gray); padding:20px;">No archives found</p>';
  }
  
  const html = `
    <!-- Voting Control Card -->
    <div class="settings-card">
      <div class="card-header">
        <i class="fas fa-power-off"></i>
        <h2>Voting Control</h2>
      </div>
      <div class="status-badge ${statusClass}">${statusText}</div>
      <div class="toggle-container">
        <span>Close Registration & Voting:</span>
        <label class="switch">
          <input type="checkbox" id="votingToggle" ${votingOpen ? 'checked' : ''} onchange="toggleVoting()">
          <span class="slider"></span>
        </label>
      </div>
      <button class="btn" onclick="closeVoting()"><i class="fas fa-lock"></i> Close Voting Now</button>
      <button class="btn" onclick="openVoting()"><i class="fas fa-lock-open"></i> Open Voting Now</button>
    </div>

    <!-- System Stats Card -->
    <div class="settings-card">
      <div class="card-header">
        <i class="fas fa-chart-pie"></i>
        <h2>System Statistics</h2>
      </div>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px; margin:20px 0;">
        <div style="background:var(--primary-soft); padding:15px; border-radius:15px; text-align:center;">
          <i class="fas fa-vote-yea fa-2x" style="color:var(--primary);"></i>
          <h3 style="font-size:2rem;">${votesCount}</h3>
          <p style="color:var(--gray);">Votes Cast</p>
        </div>
        <div style="background:var(--primary-soft); padding:15px; border-radius:15px; text-align:center;">
          <i class="fas fa-users fa-2x" style="color:var(--primary);"></i>
          <h3 style="font-size:2rem;">${votersCount}</h3>
          <p style="color:var(--gray);">Voters</p>
        </div>
        <div style="background:var(--primary-soft); padding:15px; border-radius:15px; text-align:center;">
          <i class="fas fa-user-tie fa-2x" style="color:var(--primary);"></i>
          <h3 style="font-size:2rem;">${candidatesCount}</h3>
          <p style="color:var(--gray);">Candidates</p>
        </div>
        <div style="background:var(--primary-soft); padding:15px; border-radius:15px; text-align:center;">
          <i class="fas fa-history fa-2x" style="color:var(--primary);"></i>
          <h3 style="font-size:2rem;">${historyCount}</h3>
          <p style="color:var(--gray);">Archives</p>
        </div>
      </div>
    </div>

    <!-- Year Promotion Card -->
    <div class="settings-card">
      <div class="card-header">
        <i class="fas fa-calendar-alt"></i>
        <h2>Year Promotion</h2>
      </div>
      <p>Promote all students to next class for <strong>2027</strong> elections</p>
      <div class="input-group">
        <label>Target Year:</label>
        <select id="promotionYear">
          <option value="2027">2027</option>
          <option value="2028">2028</option>
          <option value="2029">2029</option>
        </select>
      </div>
      <button class="btn" onclick="promoteStudents()"><i class="fas fa-arrow-up"></i> Promote Students</button>
      <div style="margin-top:15px; font-size:0.9rem; background:var(--primary-soft); padding:12px; border-radius:12px;">
        <p><i class="fas fa-arrow-right"></i> Form One → Form Two</p>
        <p><i class="fas fa-arrow-right"></i> Form Two → Form Three</p>
        <p><i class="fas fa-arrow-right"></i> Form Three → Form Four</p>
        <p><i class="fas fa-graduation-cap"></i> Form Four → Graduated (removed)</p>
      </div>
    </div>

    <!-- Archive Management Card -->
    <div class="settings-card">
      <div class="card-header">
        <i class="fas fa-archive"></i>
        <h2>Archive Management</h2>
      </div>
      <p>Store current data and start fresh</p>
      <button class="btn" onclick="archiveCurrentYear()"><i class="fas fa-save"></i> Archive Current Data</button>
      <button class="btn btn-danger" onclick="clearAllData()"><i class="fas fa-trash"></i> Clear All Data</button>
      
      <h3 style="margin:20px 0 10px;">Recent Archives</h3>
      <div class="history-list">
        ${historyHtml}
      </div>
      <button class="btn btn-warning" style="width:100%; margin-top:10px;" onclick="viewAllHistory()">
        <i class="fas fa-history"></i> View All Archives
      </button>
    </div>

    <!-- Voter ID Management Card -->
    <div class="settings-card">
      <div class="card-header">
        <i class="fas fa-id-card"></i>
        <h2>Voter ID Management</h2>
      </div>
      <p>Generate voter cards and manage IDs</p>
      <button class="btn" onclick="generateVoterCards()"><i class="fas fa-print"></i> Generate All Voter Cards</button>
      <button class="btn" onclick="generateCandidateCards()"><i class="fas fa-id-card"></i> Candidate Cards</button>
      
      <div class="input-group">
        <label>Custom Command:</label>
        <input type="text" id="customCommand" placeholder="Enter command (e.g., reset_voting)">
        <button class="btn" style="width:100%; margin-top:10px;" onclick="executeCommand()">
          <i class="fas fa-terminal"></i> Execute
        </button>
      </div>
    </div>
  `;
  
  settingsGrid.innerHTML = html;
}

// ================ VOTING CONTROL ================

window.toggleVoting = async function() {
  const toggle = document.getElementById("votingToggle");
  await db.ref("system/votingOpen").set(toggle.checked);
  showSuccess(`Voting is now ${toggle.checked ? 'OPEN' : 'CLOSED'}`);
  loadSettings();
};

window.closeVoting = async function() {
  document.getElementById("votingToggle").checked = false;
  await db.ref("system/votingOpen").set(false);
  showSuccess("Voting is now CLOSED");
  loadSettings();
};

window.openVoting = async function() {
  document.getElementById("votingToggle").checked = true;
  await db.ref("system/votingOpen").set(true);
  showSuccess("Voting is now OPEN");
  loadSettings();
};

// ================ YEAR PROMOTION ================

window.promoteStudents = async function() {
  if (!confirm("Promote ALL students to next class?\n\n• Form One → Form Two\n• Form Two → Form Three\n• Form Three → Form Four\n• Form Four → Graduated (removed)")) return;
  
  const year = document.getElementById("promotionYear").value;
  
  const votersSnap = await db.ref("voters").once("value");
  if (!votersSnap.exists()) return alert("No voters found");
  
  const voters = votersSnap.val();
  let promoted = 0;
  let graduated = 0;
  
  for (const [id, voter] of Object.entries(voters)) {
    let newClass = voter.classSelect;
    
    if (voter.classSelect === "Form One") newClass = "Form Two";
    else if (voter.classSelect === "Form Two") newClass = "Form Three";
    else if (voter.classSelect === "Form Three") newClass = "Form Four";
    else if (voter.classSelect === "Form Four") {
      await db.ref(`graduates/${id}`).set({ ...voter, graduatedYear: year });
      await db.ref(`voters/${id}`).remove();
      graduated++;
      continue;
    }
    
    if (newClass !== voter.classSelect) {
      await db.ref(`voters/${id}`).update({ classSelect: newClass });
      promoted++;
    }
  }
  
  showSuccess(`Promoted: ${promoted}, Graduated: ${graduated}`);
  loadSettings();
};

// ================ ARCHIVE MANAGEMENT ================

window.archiveCurrentYear = async function() {
  if (!confirm("Archive ALL current data and reset system?")) return;
  
  const year = new Date().getFullYear();
  const timestamp = Date.now();
  const key = `${year}_${timestamp}`;
  
  const votesSnap = await db.ref("votes").once("value");
  const votersSnap = await db.ref("voters").once("value");
  const candidatesSnap = await db.ref("candidates").once("value");
  
  await db.ref(`history/${key}`).set({
    votes: votesSnap.val() || {},
    voters: votersSnap.val() || {},
    candidates: candidatesSnap.val() || {},
    archivedAt: new Date().toISOString(),
    year: year
  });
  
  await db.ref("votes").remove();
  await db.ref("voters").remove();
  await db.ref("candidates").remove();
  
  showSuccess(`Data archived to ${key}`);
  loadSettings();
};

window.clearAllData = async function() {
  if (!confirm("⚠️ DELETE ALL DATA permanently? This cannot be undone!")) return;
  
  await db.ref("votes").remove();
  await db.ref("voters").remove();
  await db.ref("candidates").remove();
  
  showSuccess("All data cleared");
  loadSettings();
};

// ================ HISTORY FUNCTIONS ================

window.viewFullHistory = async function(key) {
  const snap = await db.ref(`history/${key}`).once("value");
  const data = snap.val();
  
  const votesCount = Object.keys(data.votes || {}).length;
  const votersCount = Object.keys(data.voters || {}).length;
  const candidatesCount = Object.keys(data.candidates || {}).length;
  
  const modal = document.getElementById("historyFullModal");
  const list = document.getElementById("fullHistoryList");
  
  let html = `
    <div style="grid-column:1/-1;">
      <div style="background:var(--primary-soft); padding:25px; border-radius:20px; margin-bottom:20px;">
        <h2 style="color:var(--primary);">${key}</h2>
        <p>Archived: ${new Date(data.archivedAt).toLocaleString()}</p>
        <div style="display:flex; gap:20px; margin-top:15px;">
          <span><i class="fas fa-vote-yea"></i> ${votesCount} votes</span>
          <span><i class="fas fa-users"></i> ${votersCount} voters</span>
          <span><i class="fas fa-user-tie"></i> ${candidatesCount} candidates</span>
        </div>
      </div>
    </div>
  `;
  
  // Show votes table
  if (votesCount > 0) {
    html += `
      <div style="grid-column:1/-1;">
        <h3>Votes</h3>
        <table style="width:100%; border-collapse:collapse;">
          <thead>
            <tr style="background:var(--primary); color:white;">
              <th style="padding:10px;">Voter ID</th>
              <th style="padding:10px;">Votes</th>
            </tr>
          </thead>
          <tbody>
    `;
    
    Object.entries(data.votes || {}).forEach(([id, vote]) => {
      const votesList = Object.entries(vote.votes || {}).map(([p, c]) => `${p}: ${c}`).join(", ");
      html += `<tr><td style="padding:10px; border-bottom:1px solid var(--border);">${id}</td><td style="padding:10px;">${votesList}</td></tr>`;
    });
    
    html += `</tbody></table></div>`;
  }
  
  list.innerHTML = html;
  modal.style.display = "block";
};

window.closeHistoryFullModal = function() {
  document.getElementById("historyFullModal").style.display = "none";
};

window.viewAllHistory = async function() {
  const snap = await db.ref("history").once("value");
  const history = snap.val() || {};
  
  const modal = document.getElementById("historyFullModal");
  const list = document.getElementById("fullHistoryList");
  
  let html = '';
  
  Object.entries(history).sort((a, b) => new Date(b[1].archivedAt) - new Date(a[1].archivedAt)).forEach(([key, data]) => {
    const votes = Object.keys(data.votes || {}).length;
    const voters = Object.keys(data.voters || {}).length;
    const candidates = Object.keys(data.candidates || {}).length;
    
    html += `
      <div style="background:var(--white); border:1px solid var(--border); border-radius:20px; padding:20px;">
        <h3 style="color:var(--primary);">${key}</h3>
        <p style="color:var(--gray);">${new Date(data.archivedAt).toLocaleDateString()}</p>
        <div style="display:flex; gap:10px; margin:15px 0;">
          <span><i class="fas fa-vote-yea"></i> ${votes}</span>
          <span><i class="fas fa-users"></i> ${voters}</span>
          <span><i class="fas fa-user-tie"></i> ${candidates}</span>
        </div>
        <div style="display:flex; gap:10px;">
          <button class="small-btn" onclick="viewFullHistory('${key}')"><i class="fas fa-eye"></i> View</button>
          <button class="small-btn unarchive" onclick="unarchiveHistory('${key}')"><i class="fas fa-undo"></i> Unarchive</button>
        </div>
      </div>
    `;
  });
  
  if (html === '') {
    html = '<p style="grid-column:1/-1; text-align:center; padding:40px;">No archives found</p>';
  }
  
  list.innerHTML = html;
  modal.style.display = "block";
};

window.unarchiveHistory = async function(key) {
  if (!confirm(`Unarchive ${key}?\n\nThis will RESTORE all data from this archive and OVERWRITE current data!`)) return;
  
  const snap = await db.ref(`history/${key}`).once("value");
  const data = snap.val();
  
  await db.ref("votes").set(data.votes || {});
  await db.ref("voters").set(data.voters || {});
  await db.ref("candidates").set(data.candidates || {});
  
  showSuccess(`Unarchived ${key}`);
  closeHistoryFullModal();
  loadSettings();
};

window.executeCommand = async function() {
  const cmd = document.getElementById("customCommand").value.trim();
  if (!cmd) return alert("Enter a command");
  
  if (cmd === "reset_voting") {
    await db.ref("system/votingOpen").set(true);
    showSuccess("Voting reset to OPEN");
  } else if (cmd === "clear_votes") {
    await db.ref("votes").remove();
    showSuccess("All votes cleared");
  } else if (cmd === "reset_system") {
    await db.ref("system").set({ votingOpen: true });
    await db.ref("votes").remove();
    showSuccess("System reset");
  } else {
    alert(`Unknown command: ${cmd}`);
  }
  
  document.getElementById("customCommand").value = "";
  loadSettings();
};
